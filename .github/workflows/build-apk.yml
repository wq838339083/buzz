name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Ensure Android scaffold
        run: |
          if [ ! -f "android/build.gradle" ] && [ ! -f "android/build.gradle.kts" ]; then
            echo "Scaffold missing, running flutter create..."
            flutter create . --project-name buzz --org com.example --platforms=android
          else
            echo "Scaffold already exists"
          fi

      - name: Force compileSdk/targetSdk/minSdk/ndkVersion via subprojects override
        run: |
          set -e
          SETTINGS="android/settings.gradle.kts"
          if [ ! -f "$SETTINGS" ]; then
            SETTINGS="android/settings.gradle"
          fi
          if [ ! -f "$SETTINGS" ]; then
            echo "No settings.gradle(.kts) found"
            exit 1
          fi
          echo "Appending override block to $SETTINGS"

          # This block runs for every subproject including plugin modules
          # like :vibration, :flutter_foreground_task etc.
          cat >> "$SETTINGS" <<'EOF'

// ---- Buzz CI override: force SDK/NDK versions across all modules ----
gradle.allprojects {
    afterEvaluate {
        val androidExt = extensions.findByName("android")
        if (androidExt != null) {
            try {
                val m = androidExt.javaClass.getMethod("setCompileSdkVersion", Int::class.javaPrimitiveType)
                m.invoke(androidExt, 36)
            } catch (_: Throwable) {}
            try {
                val defCfg = androidExt.javaClass.getMethod("getDefaultConfig").invoke(androidExt)
                try {
                    defCfg.javaClass.getMethod("setMinSdkVersion", Int::class.javaPrimitiveType).invoke(defCfg, 23)
                } catch (_: Throwable) {}
                try {
                    defCfg.javaClass.getMethod("setTargetSdkVersion", Int::class.javaPrimitiveType).invoke(defCfg, 36)
                } catch (_: Throwable) {}
            } catch (_: Throwable) {}
            try {
                androidExt.javaClass.getMethod("setNdkVersion", String::class.java)
                    .invoke(androidExt, "28.2.13676358")
            } catch (_: Throwable) {}
        }
    }
}
EOF
          echo "=== Tail of $SETTINGS ==="
          tail -40 "$SETTINGS"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with timestamp
        run: |
          mkdir -p dist
          STAMP=$(date -u +'%Y%m%d_%H%M')
          cp build/app/outputs/flutter-apk/app-release.apk dist/buzz_${STAMP}.apk
          cp build/app/outputs/flutter-apk/app-release.apk dist/buzz_latest.apk
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: buzz-apk
          path: client/dist/*.apk
          if-no-files-found: error

      - name: Get commit short sha
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}-${{ github.run_number }}
          name: Buzz Build #${{ github.run_number }}
          body: |
            Buzz Android APK
            - Commit: ${{ github.sha }}
            - Build: #${{ github.run_number }}
            - 下载 `buzz_latest.apk` 直接安装到手机
          files: client/dist/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
