name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Ensure Android scaffold
        run: |
          if [ ! -f "android/build.gradle" ] && [ ! -f "android/build.gradle.kts" ]; then
            echo "Scaffold missing, running flutter create..."
            flutter create . --project-name buzz --org com.example --platforms=android
          else
            echo "Scaffold already exists"
          fi

      - name: Append override script to settings.gradle
        shell: bash
        run: |
          set -e
          SETTINGS="android/settings.gradle.kts"
          if [ ! -f "$SETTINGS" ]; then
            SETTINGS="android/settings.gradle"
          fi
          if [ ! -f "$SETTINGS" ]; then
            echo "No settings.gradle(.kts) found"
            exit 1
          fi
          echo "Appending override block to $SETTINGS"
          cp override.gradle.kts /tmp/override.gradle.kts
          echo "" >> "$SETTINGS"
          cat /tmp/override.gradle.kts >> "$SETTINGS"
          echo "=== Tail of $SETTINGS ==="
          tail -50 "$SETTINGS"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with timestamp
        run: |
          mkdir -p dist
          STAMP=$(date -u +'%Y%m%d_%H%M')
          cp build/app/outputs/flutter-apk/app-release.apk dist/buzz_${STAMP}.apk
          cp build/app/outputs/flutter-apk/app-release.apk dist/buzz_latest.apk
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: buzz-apk
          path: client/dist/*.apk
          if-no-files-found: error

      - name: Get commit short sha
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}-${{ github.run_number }}
          name: Buzz Build #${{ github.run_number }}
          body: |
            Buzz Android APK
            - Commit: ${{ github.sha }}
            - Build: #${{ github.run_number }}
            - Download `buzz_latest.apk` and install on your Android phone.
          files: client/dist/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
