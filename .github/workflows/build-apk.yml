name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Ensure Android scaffold
        run: |
          if [ ! -f "android/build.gradle" ] && [ ! -f "android/build.gradle.kts" ]; then
            echo "Scaffold missing, running flutter create..."
            flutter create . --project-name buzz --org com.example --platforms=android
          else
            echo "Scaffold already exists"
          fi

      - name: Bump Android compileSdk / targetSdk / minSdk / NDK
        run: |
          set -e
          GRADLE_FILE=""
          if [ -f "android/app/build.gradle.kts" ]; then
            GRADLE_FILE="android/app/build.gradle.kts"
          elif [ -f "android/app/build.gradle" ]; then
            GRADLE_FILE="android/app/build.gradle"
          else
            echo "No build.gradle found under android/app/"
            exit 1
          fi
          echo "Patching $GRADLE_FILE"

          # compileSdk / targetSdk -> 36 ; minSdk -> 23 ; ndkVersion -> 27.0.12077973
          sed -i \
            -e 's/compileSdk *= *flutter\.compileSdkVersion/compileSdk = 36/g' \
            -e 's/compileSdkVersion *flutter\.compileSdkVersion/compileSdkVersion 36/g' \
            -e 's/compileSdk *= *[0-9]\+/compileSdk = 36/g' \
            -e 's/compileSdkVersion *[0-9]\+/compileSdkVersion 36/g' \
            -e 's/targetSdk *= *flutter\.targetSdkVersion/targetSdk = 36/g' \
            -e 's/targetSdkVersion *flutter\.targetSdkVersion/targetSdkVersion 36/g' \
            -e 's/targetSdk *= *[0-9]\+/targetSdk = 36/g' \
            -e 's/targetSdkVersion *[0-9]\+/targetSdkVersion 36/g' \
            -e 's/minSdk *= *flutter\.minSdkVersion/minSdk = 23/g' \
            -e 's/minSdkVersion *flutter\.minSdkVersion/minSdkVersion 23/g' \
            -e 's/ndkVersion *= *flutter\.ndkVersion/ndkVersion = "27.0.12077973"/g' \
            -e 's/ndkVersion *flutter\.ndkVersion/ndkVersion "27.0.12077973"/g' \
            "$GRADLE_FILE"

          echo "=== Patched sections ==="
          grep -nE 'compileSdk|targetSdk|minSdk|ndkVersion' "$GRADLE_FILE" || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with timestamp
        run: |
          mkdir -p dist
          STAMP=$(date -u +'%Y%m%d_%H%M')
          cp build/app/outputs/flutter-apk/app-release.apk dist/buzz_${STAMP}.apk
          cp build/app/outputs/flutter-apk/app-release.apk dist/buzz_latest.apk
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: buzz-apk
          path: client/dist/*.apk
          if-no-files-found: error

      - name: Get commit short sha
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}-${{ github.run_number }}
          name: Buzz Build #${{ github.run_number }}
          body: |
            Buzz Android APK
            - Commit: ${{ github.sha }}
            - Build: #${{ github.run_number }}
            - 下载 `buzz_latest.apk` 直接安装到手机
          files: client/dist/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
